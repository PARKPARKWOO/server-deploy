global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'dockerswarm'
    dockerswarm_sd_configs:
      - host: unix:///var/run/docker.sock
        role: tasks
    relabel_configs:
      # 실행 중인 태스크만 유지
      - source_labels: [__meta_dockerswarm_task_desired_state]
        regex: 'running'
        action: keep
      # prometheus.scrape=true 라벨이 달린 서비스만 스크랩
      - source_labels: [__meta_dockerswarm_service_label_prometheus_scrape]
        regex: 'true'
        action: keep
      # 중복 제거: ingress 네트워크 엔트리 버림
      - source_labels: [__meta_dockerswarm_network_ingress]
        regex: 'true'
        action: drop
      # 중복 제거: internal-network에 붙은 엔드포인트만 유지
      - source_labels: [__meta_dockerswarm_network_name]
        regex: 'internal-network'
        action: keep
      # prometheus.port 라벨 값으로 타겟 포트 덮어쓰기
      - source_labels: [__address__, __meta_dockerswarm_service_label_prometheus_port]
        regex: '([^:]+)(?::\d+)?;(\d+)'
        replacement: '$1:$2'
        target_label: __address__
      # prometheus.path 라벨 값으로 metrics path 설정 (기본 /metrics)
      - source_labels: [__meta_dockerswarm_service_label_prometheus_path]
        regex: (.+)
        target_label: __metrics_path__
      # prometheus.job 라벨이 있으면 job 이름 덮어쓰기
      - source_labels: [__meta_dockerswarm_service_label_prometheus_job]
        regex: (.+)
        target_label: job
      # application 라벨 = 서비스 이름 (스택 prefix 제거)
      - source_labels: [__meta_dockerswarm_service_name]
        regex: '(?:.+_)?(.+)'
        target_label: application
