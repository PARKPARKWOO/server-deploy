version: '3.8'

secrets:
  s3_access_key:
    external: true
  s3_secret_key:
    external: true
  ors_api_key:
    external: true
  public_data_api_key:
    external: true

services:
  auth-server:
    image: 'wy9295/auth-server:b46cf211c120a30c0304ed5532ce61351b5af536'
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        monitor: 90s
        failure_action: rollback
      rollback_config:
        order: start-first
        parallelism: 1
      placement:
        constraints:
          - "node.hostname == pve"
      labels:
        - "prometheus.enable=true"
        - "prometheus.scrape=true"
        - "prometheus.path=/actuator/prometheus"
        - "prometheus.port=8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - internal-network
      - auth-server
      - barbellrobot-backend
    environment:
      - REDIS_PORT=6379
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RDBMS_URL=mysql-master
      - RDBMS_USERNAME=${RDBMS_USERNAME}
      - RDBMS_PASSWORD=${RDBMS_PASSWORD}
      - ACCESS_SECRET_KEY=${ACCESS_SECRET_KEY}
      - ACCESS_EXPIRE_MILLIS=${ACCESS_EXPIRE_MILLIS}
      - REFRESH_SECRET_KEY=${REFRESH_SECRET_KEY}
      - REFRESH_EXPIRE_MILLIS=${REFRESH_EXPIRE_MILLIS}
      - EUREKA_URI=http://eureka:8761/eureka
      - PYROSCOPE_SERVER_ADDRESS=http://pyroscope:4040
      - PYROSCOPE_APPLICATION_NAME=dev-auth

  find-my-pet-backend:
    image: 'wy9295/find-my-pet-backend:1d4ad98034ff7a82ec264d85d89721ccb78d6d5b'
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        monitor: 90s
        failure_action: rollback
      rollback_config:
        order: start-first
        parallelism: 1
      placement:
        constraints:
          - "node.hostname == pve"
      labels:
        - "prometheus.enable=true"
        - "prometheus.scrape=true"
        - "prometheus.path=/actuator/prometheus"
        - "prometheus.port=8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - internal-network
      - find-my-pet-backend
#    - AUTH_HOST=auth 는 전환 때문에 잠시 추가함 최신버전 배포 후 수정
    secrets:
      - source: ors_api_key
        target: ors_api_key
      - source: public_data_api_key
        target: public_data_api_key
    environment:
      - REDIS_PORT=6379
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RDBMS_URI=mysql-master
      - RDBMS_USERNAME=${RDBMS_USERNAME}
      - RDBMS_PASSWORD=${RDBMS_PASSWORD}
      - AUTH_NAME=auth
      - AUTH_HOST=auth
      - STORAGE_NAME=storage
      - PLATFORM_HOLDER_CDN_HOST=https://cdn.platformholder.site
      - KAFKA_HOST=kafka1:9092
      - EUREKA_URI=http://eureka:8761/eureka
      - MONGODB_USERNAME=${MONGODB_USERNAME}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_HOST=mongodb
      - ORS_API_KEY_FILE=/run/secrets/ors_api_key
      - PUBLIC_DATA_API_KEY_FILE=/run/secrets/public_data_api_key

  barbellrobot-backend:
    image: 'wy9295/barbellrobot-backend:1db7eb8f8b7043e836f2d9e7eaf21d2f2bfabd0e'
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        monitor: 90s
        failure_action: rollback
      rollback_config:
        order: start-first
        parallelism: 1
      placement:
        constraints:
          - "node.hostname == pve"
      labels:
        - "prometheus.enable=true"
        - "prometheus.scrape=true"
        - "prometheus.path=/actuator/prometheus"
        - "prometheus.port=8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - internal-network
      - barbellrobot-backend
    environment:
      - REDIS_PORT=6379
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RDBMS_URI=mysql-master
      - RDBMS_USERNAME=${RDBMS_USERNAME}
      - RDBMS_PASSWORD=${RDBMS_PASSWORD}
      - EUREKA_URI=http://eureka:8761/eureka
      - AUTH_NAME=auth
      - STORAGE_NAME=storage
      - AI_SERVICE_NAME=spring-ai
      - PLATFORM_HOLDER_CDN_HOST=https://cdn.platformholder.site
      - APPLICATION_ID=019d1af5-288f-70d5-a39e-783fd6dc30af
      - ACCESS_SECRET_KEY=${ACCESS_SECRET_KEY}
      - ACCESS_EXPIRE_MILLIS=${ACCESS_EXPIRE_MILLIS}
      - REFRESH_SECRET_KEY=${REFRESH_SECRET_KEY}
      - REFRESH_EXPIRE_MILLIS=${REFRESH_EXPIRE_MILLIS}
      - GMAIL_USERNAME=${GMAIL_USERNAME}
      - GMAIL_PASSWORD=${GMAIL_PASSWORD}

  gateway:
    image: 'wy9295/gateway:1d7d5c9751df1640a309295c4ae4ab3e8058eedb'
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        monitor: 90s
        failure_action: rollback
      rollback_config:
        order: start-first
        parallelism: 1
      placement:
        constraints:
          - "node.hostname == pve"
      labels:
        - "prometheus.enable=true"
        - "prometheus.scrape=true"
        - "prometheus.path=/actuator/prometheus"
        - "prometheus.port=8080"
        - "traefik.enable=true"
        # 메인 라우터: duckdns DNS challenge로 발급된 기존 cert 사용.
        # fmp.platformholder.site 는 이 번들에서 제외 — cert 갱신 영향 격리.
        - "traefik.http.routers.gateway.rule=Host(`woo-auth.duckdns.org`) || Host(`bbr.platformholder.site`) || Host(`cdn.platformholder.site`) || Host(`forest.platformholder.site`) || Host(`auth.platformholder.site`) || Host(`mirror-view.platformholder.site`) || Host(`gateway.platformholder.site`) || Host(`backoffice.platformholder.site`)"
        - "traefik.http.services.gateway.loadbalancer.server.port=8080"
        - "traefik.http.routers.gateway.entrypoints=websecure"
        - "traefik.http.routers.gateway.tls=true"
        - "traefik.http.routers.gateway.tls.certresolver=myresolver"
        # 격리된 fmp 라우터: TLS-ALPN-01로 자체 cert 발급. 실패해도 위 번들과 독립.
        - "traefik.http.routers.fmp-gateway.rule=Host(`fmp.platformholder.site`)"
        - "traefik.http.routers.fmp-gateway.service=gateway"
        - "traefik.http.routers.fmp-gateway.entrypoints=websecure"
        - "traefik.http.routers.fmp-gateway.tls=true"
        - "traefik.http.routers.fmp-gateway.tls.certresolver=fmpresolver"
        - "traefik.docker.network=gateway"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - internal-network
      - gateway
    environment:
      - BBR_NAME=dev-bbr-backend
      - FMP_NAME=dev-fmp-backend
      - AUTH_NAME=dev-auth
      - BBR_HOST=barbellrobot-backend
      - FMP_HOST=find-my-pet-backend
      - AUTH_HOST=auth-server
      - STORAGE_HOST=storage
      - STORAGE_NAME=dev-storage
      - EUREKA_URI=http://eureka:8761/eureka
      - FOREST_NAME=dev-forest
      - FOREST_HOST=forest
      - MV_NAME=dev-mirror-view
      - MV_HOST=mirror-view
      - BACKOFFICE_NAME=dev-backoffice-bff
      - BACKOFFICE_HOST=backoffice-bff

  eureka:
    image: 'wy9295/eureka:273ceb3db81d3726dd9db44eb1854e19c9a2af3b'
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - "node.hostname == my"
    networks:
      - internal-network

  orchestrator:
    image: 'wy9295/orchestrator:798d4981dd564532020f2371925c0f7ceadec5e9'
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        monitor: 90s
        failure_action: rollback
      rollback_config:
        order: start-first
        parallelism: 1
      placement:
        constraints:
          - "node.hostname == pve"
      labels:
        - "prometheus.enable=true"
        - "prometheus.scrape=true"
        - "prometheus.path=/actuator/prometheus"
        - "prometheus.port=8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - internal-network
      - barbellrobot-backend
    environment:
      - RDBMS_USERNAME=${RDBMS_USERNAME}
      - RDBMS_PASSWORD=${RDBMS_PASSWORD}
      - RDBMS_URL=mysql-master
      - AUTH_RDBMS_URL=mysql-master
      - AUTH_RDBMS_USER=${RDBMS_USERNAME}
      - AUTH_RDBMS_PASSWORD=${RDBMS_PASSWORD}
      - KAFKA_HOST=kafka1:9092
      - PYROSCOPE_SERVER_ADDRESS=http://pyroscope:4040
      - PYROSCOPE_APPLICATION_NAME=dev-orchestrator
      - REDIS_PORT=6379
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  storage:
    image: 'wy9295/storage:eff61d19c4cec4ee0aa111885bb7cacc305581a1'
    extra_hosts:
      - "bucket.platformholder.site:172.30.1.42"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        monitor: 90s
        failure_action: rollback
      rollback_config:
        order: start-first
        parallelism: 1
      labels:
        - "prometheus.enable=true"
        - "prometheus.scrape=true"
        - "prometheus.path=/actuator/prometheus"
        - "prometheus.port=8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    secrets:
      - source: s3_access_key
        target: minio.access-key
      - source: s3_secret_key
        target: minio.secret-key
    networks:
      - internal-network
    environment:
      - REDIS_PORT=6379
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RDBMS_URL=mysql-master
      - RDBMS_USERNAME=${RDBMS_USERNAME}
      - RDBMS_PASSWORD=${RDBMS_PASSWORD}
      - EUREKA_URI=http://eureka:8761/eureka
      - PYROSCOPE_SERVER_ADDRESS=http://pyroscope:4040
      - PYROSCOPE_APPLICATION_NAME=dev-storage
      - AUTH_NAME=auth
      - AUTH_HOST=auth
      - CASSANDRA_URL=cassandra-1
      - CASSANDRA_USERNAME=${CASSANDRA_USERNAME}
      - CASSANDRA_PASSWORD=${CASSANDRA_PASSWORD}
      - KAFKA_HOST=kafka1:9092
      - SPRING_CONFIG_IMPORT=optional:configtree:/run/secrets/
      - MINIO_URL=https://bucket.platformholder.site
      - MINIO_INTERNAL_URL=http://minio-1:9000
  forest:
    image: 'wy9295/forest:9eadb63e656ffed326c9bdbcc062a4ced8e1e77d'
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        monitor: 90s
        failure_action: rollback
      rollback_config:
        order: start-first
        parallelism: 1
      labels:
        - "prometheus.enable=true"
        - "prometheus.scrape=true"
        - "prometheus.path=/actuator/prometheus"
        - "prometheus.port=8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - internal-network
    environment:
      - REDIS_PORT=6379
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RDBMS_URL=mysql-master
      - RDBMS_USERNAME=${RDBMS_USERNAME}
      - RDBMS_PASSWORD=${RDBMS_PASSWORD}
      - EUREKA_URI=http://eureka:8761/eureka
      - PYROSCOPE_SERVER_ADDRESS=http://pyroscope:4040
      - PYROSCOPE_APPLICATION_NAME=dev-forest
#      - CASSANDRA_URL=cassandra-1
#      - CASSANDRA_USERNAME=${CASSANDRA_USERNAME}
#      - CASSANDRA_PASSWORD=${CASSANDRA_PASSWORD}
      - MONGODB_USERNAME=${MONGODB_USERNAME}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_HOST=mongodb
      - AUTH_NAME=auth
      - AUTH_HOST=auth
      - STORAGE_NAME=storage
      - PLATFORM_HOLDER_CDN_HOST=https://cdn.platformholder.site
      - KAFKA_HOST=kafka1:9092
      - AES_KEY=${AES_KEY}
      - HMAC_KEY=${HMAC_KEY}

  websocket-server:
    image: 'wy9295/websocket-server:841abc9'
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        monitor: 60s
        failure_action: rollback
      rollback_config:
        order: start-first
        parallelism: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.ws-secure.rule=Host(`ws.platformholder.site`)"
        - "traefik.http.routers.ws-secure.entrypoints=websecure"
        - "traefik.http.routers.ws-secure.tls.certresolver=myresolver"
        - "traefik.http.services.ws-service.loadbalancer.server.port=8080"
        - "traefik.http.routers.ws-secure.service=ws-service"
        - "prometheus.enable=true"
        - "prometheus.scrape=true"
        - "prometheus.path=/metrics"
        - "prometheus.port=8080"
    networks:
      - internal-network
    environment:
      - REDIS_PORT=6379
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - EUREKA_URI=http://eureka:8761/eureka
      - AUTH_NAME=auth-server
      - AUTH_HOST=auth-server:9090
      - KAFKA_HOST=kafka1:9092
      - STORAGE_NAME=storage
      - PLATFORM_HOLDER_CDN_HOST=https://cdn.platformholder.site
      - MV_HOST=http://mirror-view-backend:8080

  mirror-view-backend:
    image: 'wy9295/mirror-view-backend:57f94cdc7e450c24d7d82619d60adfb7ba443add'
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        monitor: 90s
        failure_action: rollback
      rollback_config:
        order: start-first
        parallelism: 1
      labels:
        - "prometheus.enable=true"
        - "prometheus.scrape=true"
        - "prometheus.path=/actuator/prometheus"
        - "prometheus.port=8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - internal-network
#    secrets:
#      - source: s3_access_key
#        target: minio.access-key
#      - source: s3_secret_key
#        target: minio.secret-key
    environment:
      - REDIS_PORT=6379
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - EUREKA_URI=http://eureka:8761/eureka
      - AUTH_NAME=auth
      - AUTH_HOST=auth
      - KAFKA_HOST=kafka1:9092
      - CASSANDRA_URL=cassandra-1
      - CASSANDRA_USERNAME=${CASSANDRA_USERNAME}
      - CASSANDRA_PASSWORD=${CASSANDRA_PASSWORD}
      - RDBMS_URL=mysql-master
      - RDBMS_USERNAME=${RDBMS_USERNAME}
      - RDBMS_PASSWORD=${RDBMS_PASSWORD}
      - PYROSCOPE_SERVER_ADDRESS=http://pyroscope:4040
      - PYROSCOPE_APPLICATION_NAME=dev-mirror-view
      - PLATFORM_HOLDER_CDN_HOST=https://cdn.platformholder.site
      - STORAGE_NAME=storage

  spring-ai:
    image: 'wy9295/spring-ai:ce1fba952fab4d71b1a9e90dea4977036943c242'
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        monitor: 90s
        failure_action: rollback
      rollback_config:
        order: start-first
        parallelism: 1
      placement:
        constraints:
          - "node.hostname == pve"
      labels:
        - "prometheus.enable=true"
        - "prometheus.scrape=true"
        - "prometheus.path=/actuator/prometheus"
        - "prometheus.port=8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - internal-network
    environment:
      - MYSQL_HOST=mysql-master
      - MYSQL_PORT=3306
      - MYSQL_USERNAME=${RDBMS_USERNAME}
      - MYSQL_PASSWORD=${RDBMS_PASSWORD}
      - FLYWAY_USER=${RDBMS_USERNAME}
      - FLYWAY_PASSWORD=${RDBMS_PASSWORD}
      - REDIS_PORT=6379
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - EUREKA_URI=http://eureka:8761/eureka
      - GRPC_PORT=9090
      - PYROSCOPE_SERVER_ADDRESS=http://pyroscope:4040
      - PYROSCOPE_APPLICATION_NAME=dev-spring-ai
      - API_KEY_SECRET_BASE64=${API_KEY_SECRET_BASE64}

  backoffice-bff:
    image: 'wy9295/backoffice-bff:09fe40aff3ca27069de77b869972d623ac66208f'
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
        monitor: 90s
        failure_action: rollback
      rollback_config:
        order: start-first
        parallelism: 1
      placement:
        constraints:
          - "node.hostname == pve"
      labels:
        - "prometheus.enable=true"
        - "prometheus.scrape=true"
        - "prometheus.path=/actuator/prometheus"
        - "prometheus.port=8080"
    # NOTE: bff base image (eclipse-temurin:21-jre-alpine)는 bash 없음 → busybox wget 사용
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - internal-network
    environment:
      - EUREKA_URI=http://eureka:8761/eureka
      - AUTH_HOST=auth-server
      - AUTH_GRPC_PORT=9090
      - PYROSCOPE_SERVER_ADDRESS=http://pyroscope:4040
      - PYROSCOPE_APPLICATION_NAME=dev-backoffice-bff
      - COOKIE_DOMAIN=.platformholder.site

networks:
  barbellrobot-backend:
    driver: overlay
    name: barbellrobot-backend
    attachable: true
  find-my-pet-backend:
    driver: overlay
    name: find-my-pet-backend
    attachable: true
  internal-network:
    driver: overlay
    name: internal-network
    attachable: true
  auth-server:
    driver: overlay
    attachable: true
    name: auth-server
  gateway:
    driver: overlay
    name: gateway
    attachable: true

volumes:
  google-key: