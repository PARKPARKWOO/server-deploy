name: Deploy via Docker Compose

on:
  repository_dispatch:
    types: [update_app_image_tag]
  workflow_dispatch:

# 여러 앱이 동시에 dispatch 해도 compose/.../server/docker-compose.yml 에 대한
# 쓰기 경합(race)을 피하기 위해 환경 단위로 직렬화한다.
# cancel-in-progress=false: 앞 실행을 절대 취소하지 않음 (태그 드롭 방지).
concurrency:
  group: update-image-tag-${{ github.event.client_payload.environment || inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  restricted-workflow:
    name: Run Restricted Workflow
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Restricted Workflow
        run: echo "Restricted Workflow triggered"

  commit-changes:
    needs: restricted-workflow
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # rebase retry 가 shallow clone에서도 실패하지 않도록 full history.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set environment variables
        run: |
          echo "IMAGE_TAG=${{ github.event.client_payload.image_tag }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.app }}" >> $GITHUB_ENV
          echo "ENVIRONMENT=${{ github.event.client_payload.environment }}" >> $GITHUB_ENV

      - name: Get current image tag
        id: get_current_tag
        run: |
          export CURRENT_TAG=$(grep "image: ${APP_NAME}" compose/${{ env.ENVIRONMENT }}/server/docker-compose.yml | cut -d':' -f3)
          echo "CURRENT_TAG=$CURRENT_TAG" >> $GITHUB_ENV

      - name: Replace image tag only if different
        run: |
          echo "Current Tag: ${{ env.CURRENT_TAG }}"
          echo "New Tag: ${{ env.IMAGE_TAG }}"
          if [ "${{ env.CURRENT_TAG }}" != "${{ env.IMAGE_TAG }}" ]; then
            echo "Replacing image tag from ${{ env.CURRENT_TAG }} to ${{ env.IMAGE_TAG }}"
            sed -i "/${{ env.APP_NAME }}/!b;n;s|image:.*|image: '"${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}"'|" compose/${{ env.ENVIRONMENT }}/server/docker-compose.yml
          else
            echo "Image tag is the same, no changes needed."
          fi

      - name: Check if file has changed
        run: |
          git diff compose/${{ env.ENVIRONMENT }}/server/docker-compose.yml || echo "No changes in the file."

      - name: Commit and Push Changes (with rebase retry)
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add compose/${{ env.ENVIRONMENT }}/server/docker-compose.yml
          if git diff --cached --exit-code; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update image tag for ${{ env.APP_NAME }} to ${{ env.IMAGE_TAG }}"

          # concurrency 로 원칙적 경합은 제거됐지만,
          # 외부 커밋이 끼어들 극한 경우에 대비해 rebase 재시도 루프.
          MAX_ATTEMPTS=5
          for i in $(seq 1 $MAX_ATTEMPTS); do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push rejected on attempt $i, attempting rebase onto origin/main..."
            git fetch origin main
            git pull --rebase origin main || {
              echo "Rebase failed on attempt $i (possible conflict on the same service tag line)."
              exit 1
            }
          done
          echo "All $MAX_ATTEMPTS attempts exhausted."
          exit 1

  deploy:
    needs: commit-changes
    runs-on: [self-hosted, label-deploy2]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set environment variables
        run: |
          echo "IMAGE_TAG=${{ github.event.client_payload.image_tag }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.app }}" >> $GITHUB_ENV
          echo "ENVIRONMENT=${{ github.event.client_payload.environment }}" >> $GITHUB_ENV

      - name: Debug - Print environment variables
        run: |
          echo "ENVIRONMENT=${{ env.ENVIRONMENT }}"
          echo "IMAGE_TAG=${{ env.IMAGE_TAG }}"
          echo "APP_NAME=${{ env.APP_NAME }}"

      - name: Docker Hub login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Deploy with Docker Stack (verify + fallback)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          RDBMS_USERNAME: ${{ secrets.RDBMS_USERNAME }}
          RDBMS_PASSWORD: ${{ secrets.RDBMS_PASSWORD }}
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GEMINI_PROJECT_ID: ${{ secrets.GEMINI_PROJECT_ID }}
          GEMINI_LOCATION: ${{ secrets.GEMINI_LOCATION }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
          AWS_S3_ACCESS_KEY: ${{ secrets.AWS_S3_ACCESS_KEY }}
          AWS_S3_SECRET_KEY: ${{ secrets.AWS_S3_SECRET_KEY }}
          ACCESS_SECRET_KEY: ${{ secrets.ACCESS_SECRET_KEY }}
          ACCESS_EXPIRE_MILLIS: ${{ secrets.ACCESS_EXPIRE_MILLIS }}
          REFRESH_SECRET_KEY: ${{ secrets.REFRESH_SECRET_KEY }}
          REFRESH_EXPIRE_MILLIS: ${{ secrets.REFRESH_EXPIRE_MILLIS }}
          CLOUD_FRONT_DOMAIN_NAME: ${{ secrets.CLOUD_FRONT_DOMAIN_NAME }}
          FMP_GOOGLE_CLIENT_ID: ${{ secrets.FMP_GOOGLE_CLIENT_ID }}
          FMP_GOOGLE_CLIENT_SECRET: ${{ secrets.FMP_GOOGLE_CLIENT_SECRET }}
          FMP_KAKAO_CLIENT_ID: ${{ secrets.FMP_KAKAO_CLIENT_ID }}
          MONGODB_USERNAME: ${{ secrets.MONGO_ROOT_USERNAME }}
          MONGODB_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          CASSANDRA_USERNAME: ${{ secrets.CASSANDRA_USERNAME }}
          CASSANDRA_PASSWORD: ${{ secrets.CASSANDRA_PASSWORD }}
          AES_KEY: ${{ secrets.AES_KEY }}
          HMAC_KEY: ${{ secrets.HMAC_KEY }}
          FLYWAY_USER: ${{ secrets.RDBMS_USERNAME }}
          FLYWAY_PASSWORD: ${{ secrets.RDBMS_PASSWORD }}
        run: |
          set -euo pipefail
          STACK_NAME="${{ env.ENVIRONMENT }}"
          COMPOSE_FILE="compose/${{ env.ENVIRONMENT }}/server/docker-compose.yml"
          SERVICE_NAME="${STACK_NAME}_${{ env.APP_NAME }}"
          TARGET_IMAGE="${DOCKERHUB_USERNAME}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}"

          echo ">>> Deploying stack: $STACK_NAME (trigger=${{ env.APP_NAME }} -> ${{ env.IMAGE_TAG }})"
          docker stack deploy \
            -c "$COMPOSE_FILE" \
            --with-registry-auth \
            --prune=false \
            "$STACK_NAME"

          echo ""
          echo ">>> Step 1/3: Waiting up to 180s for service spec to reflect TARGET_IMAGE=$TARGET_IMAGE"
          DEADLINE=$(( $(date +%s) + 180 ))
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            CURRENT=$(docker service inspect "$SERVICE_NAME" \
              --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}' 2>/dev/null \
              | sed 's/@sha256:.*$//' || echo "")
            if [ "$CURRENT" = "$TARGET_IMAGE" ]; then
              echo "    spec already matches"
              break
            fi
            echo "    current spec: $CURRENT (waiting...)"
            sleep 5
          done

          FINAL_SPEC=$(docker service inspect "$SERVICE_NAME" \
            --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}' | sed 's/@sha256:.*$//')

          if [ "$FINAL_SPEC" != "$TARGET_IMAGE" ]; then
            echo ""
            echo ">>> Step 2/3: stack deploy did not refresh spec. Falling back to docker service update."
            echo "    Expected: $TARGET_IMAGE"
            echo "    Actual:   $FINAL_SPEC"
            docker service update --with-registry-auth \
              --image "$TARGET_IMAGE" \
              "$SERVICE_NAME"
          else
            echo ""
            echo ">>> Step 2/3: skipped — spec already updated."
          fi

          echo ""
          echo ">>> Step 3/3: Waiting up to 180s for at least one Running task with the target image..."
          DEADLINE=$(( $(date +%s) + 180 ))
          SUCCESS=0
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            RUNNING_COUNT=$(docker service ps "$SERVICE_NAME" \
              --filter "desired-state=running" \
              --format '{{.CurrentState}}' \
              | grep -c '^Running' || true)
            if [ "$RUNNING_COUNT" -ge 1 ]; then
              SUCCESS=1
              echo "    ✓ $RUNNING_COUNT running task(s)"
              break
            fi
            echo "    (no running tasks yet, waiting...)"
            sleep 10
          done

          echo ""
          echo ">>> Final service state:"
          docker service ps "$SERVICE_NAME" --no-trunc | head -8 || true

          if [ "$SUCCESS" -ne 1 ]; then
            echo ""
            echo "!!! Rollout verification FAILED. No Running task within 3 minutes."
            echo "!!! Check above ps output for CurrentState / ERROR columns."
            exit 1
          fi

          echo ""
          echo "✓ Deploy verified: $SERVICE_NAME running with $TARGET_IMAGE"

